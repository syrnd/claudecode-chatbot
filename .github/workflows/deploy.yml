name: Deploy

on:
  push:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile bot.py
      - name: Import check
        # bot.py はトップレベルで .env / /srv 配下のファイル読込を試みるが、
        # 存在しない場合はいずれも安全にスキップされるため CI ランナー上でも成功する
        run: |
          TELEGRAM_BOT_TOKEN=dummy python -c "import bot"

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /srv/claudecode-chatbot
            # デプロイ先のローカル編集に阻まれないよう pull ではなく fetch + reset を使う
            # （デプロイ先は直接編集しない運用。過去に pull が黙って失敗し古いコードのまま
            #   再起動される事故があったため、途中失敗は set -e でジョブを赤にする）
            git fetch origin master
            git reset --hard origin/master
            docker compose up -d --build
